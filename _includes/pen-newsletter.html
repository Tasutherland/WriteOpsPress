{% comment %}
  Per-pen inline newsletter CTA using MailerLite popup trigger.
  Usage: {% include pen-newsletter.html pen_name=page.title %}
{% endcomment %}

<section class="pen-newsletter-cta" style="--pen-accent: {{ page.accent }}">
  <div class="container">
    <div class="newsletter-cta-inner">
      <div class="newsletter-cta-copy">
        <p class="newsletter-cta-eyebrow">Newsletter</p>
        <h2 class="newsletter-cta-title">Follow this pen name.</h2>
        <p class="newsletter-cta-text">
          Get release news, preorder alerts, and reader extras for this romance lane.
        </p>
      </div>
      <div class="newsletter-cta-action">
        <a class="btn btn-primary ml-onclick-form"
           href="javascript:void(0)"
           onclick="ml('show', 'VWVLkT', true)">
          Subscribe
        </a>
      </div>
    </div>
  </div>
</section>
