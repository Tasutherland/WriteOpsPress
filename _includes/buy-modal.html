<!-- Buy Modal — country picker -->
<div id="buy-modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title" hidden>
  <div class="modal-backdrop"></div>
  <div class="modal-dialog">
    <div class="modal-header">
      <h2 id="modal-title" class="modal-book-title">Choose your store</h2>
      <button class="modal-close" aria-label="Close store picker">&times;</button>
    </div>
    <div class="modal-body">
      <p class="modal-subhead">Select your preferred retailer:</p>
      <div id="modal-store-buttons" class="store-buttons">
        <!-- Populated by JS -->
      </div>
    </div>
  </div>
</div>
