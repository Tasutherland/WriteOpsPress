title: WriteOps Press
description: "Independent publishing house. Six authors. One catalog."
url: ""
baseurl: ""
email: contact@writeopspress.com

# Build settings
markdown: kramdown
highlighter: rouge
permalink: pretty

# Plugins
plugins:
  - jekyll-sitemap
  - jekyll-seo-tag

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - node_modules/

# Defaults
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"
  - scope:
      path: "pen-names"
      type: "pages"
    values:
      layout: "pen-name"

# Pen name accent colors (used in templates)
pen_names:
  - id: ash-wilder
    name: Ash Wilder
    accent: "#7A1E2C"
    data_key: ash
    promise: "Dark, intense MM BDSM and paranormal romance where desire and danger collide."
    content_notes: true
  - id: nyx-montreaux
    name: Nyx Montreaux
    accent: "#1C3F5E"
    data_key: nyx
    promise: "Mafia romance dripping with danger, obsession, and heat."
    content_notes: false
  - id: rook-brennan
    name: Rook Brennan
    accent: "#2B5D3F"
    data_key: rook
    promise: "MM monster romance and dark fantasy — creatures with sharp edges and the men brave enough to want them."
    content_notes: true
  - id: clay-daintry
    name: Clay Daintry
    accent: "#6B4A2B"
    data_key: clay
    promise: "MM cowboy romance with grit, heat, and wide-open country."
    content_notes: false
  - id: jay-mcgilvery
    name: Jay McGilvery
    accent: "#1E4E7A"
    data_key: jay
    promise: "Sports romance—locker rooms, rivalry, and the kind of chemistry that breaks records."
    content_notes: false
  - id: rita-dole
    name: Rita Dole
    accent: "#4B2A63"
    data_key: rita
    promise: "MF monster romance and reverse harem dark fantasy — dark, daring, and seriously spicy."
    content_notes: true
