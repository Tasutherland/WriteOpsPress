title: WriteOps Press
description: "Independent romance publisher specializing in high-heat MM, monster, paranormal, romantasy, and dark fantasy romance."
url: "https://writeopshq.com"
baseurl: ""
email: contact@writeopspress.com

# Build settings
markdown: kramdown
highlighter: rouge
permalink: pretty

# Plugins
plugins:
  - jekyll-sitemap
  - jekyll-seo-tag

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - node_modules/

# Defaults
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"
  - scope:
      path: "pen-names"
      type: "pages"
    values:
      layout: "pen-name"

# Public pen names shown in the site navigation.
# Hidden pages can still exist, but only these authors appear in the main site UI.
pen_names:
  - id: ash-wilder
    name: Ash Wilder
    accent: "#7A1E2C"
    data_key: ash
    promise: "Dark, intense MM BDSM and paranormal romance where control, danger, and desire collide."
    content_notes: true
  - id: rook-brennan
    name: Rook Brennan
    accent: "#2B5D3F"
    data_key: rook
    promise: "MM monster romance and dark fantasy with dangerous creatures, possessive heat, and love that bites back."
    content_notes: true
  - id: alexandra-sterling
    name: Alexandra Sterling
    accent: "#7B3F61"
    data_key: alexandra
    promise: "High-heat monster court romance and fantasy romance with dangerous rulers, binding bargains, and heroines who refuse to break."
    content_notes: true
  - id: rita-dole
    name: Rita Dole
    accent: "#4B2A63"
    data_key: rita
    promise: "High-heat MF monster romance and dark romantasy where bargains cut deep, queens are forged under pressure, and desire has teeth."
    content_notes: true
